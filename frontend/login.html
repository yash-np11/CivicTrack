<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CivicTrack Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(
135deg,
#020617,
#0f172a,
#1d4ed8
);
overflow:hidden;
}

/* BACKGROUND GLOW */

.circle{
position:absolute;
border-radius:50%;
filter:blur(90px);
opacity:0.5;
}

.circle1{
width:300px;
height:300px;
background:#2563eb;
top:-80px;
left:-60px;
}

.circle2{
width:350px;
height:350px;
background:#7c3aed;
bottom:-100px;
right:-80px;
}

/* LOGIN BOX */

.container{
position:relative;
width:420px;
padding:40px;
border-radius:28px;

background:rgba(255,255,255,0.08);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,0.15);

box-shadow:
0 8px 32px rgba(0,0,0,0.35);

color:white;

animation:fadeIn 1s ease;
}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(25px);
}

to{
opacity:1;
transform:translateY(0px);
}

}

.logo{
font-size:50px;
text-align:center;
margin-bottom:10px;
}

h1{
text-align:center;
font-size:34px;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#cbd5e1;
font-size:14px;
margin-bottom:30px;
}

/* INPUTS */

.input-box{
margin-bottom:20px;
}

.input-box label{
display:block;
margin-bottom:8px;
font-size:14px;
color:#e2e8f0;
}

.input-box input{
width:100%;
padding:15px;
border:none;
border-radius:14px;
outline:none;
background:rgba(255,255,255,0.12);
color:white;
font-size:15px;
transition:0.3s;
}

.input-box input:focus{
background:rgba(255,255,255,0.18);
box-shadow:0 0 15px rgba(59,130,246,0.4);
}

.input-box input::placeholder{
color:#cbd5e1;
}

/* BUTTON */

.login-btn{
width:100%;
padding:15px;
border:none;
border-radius:15px;

background:
linear-gradient(
90deg,
#2563eb,
#7c3aed
);

color:white;
font-size:17px;
font-weight:600;
cursor:pointer;

transition:0.3s;
}

.login-btn:hover{
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(37,99,235,0.4);
}

/* FOOTER */

.footer{
text-align:center;
margin-top:22px;
font-size:13px;
color:#cbd5e1;
}

.footer span{
color:#60a5fa;
font-weight:600;
cursor:pointer;
}

</style>

</head>

<body>

<div class="circle circle1"></div>
<div class="circle circle2"></div>

<div class="container">

<div class="logo">
🚀
</div>

<h1>CivicTrack Pro</h1>

<div class="subtitle">
Smart Civic Complaint Management System
</div>

<div class="input-box">
<label>Email Address</label>

<input
type="email"
id="email"
placeholder="Enter your email">
</div>

<div class="input-box">
<label>Password</label>

<input
type="password"
id="password"
placeholder="Enter your password">
</div>

<button
class="login-btn"
onclick="login()">

Login Securely 🔐

</button>

<div class="footer">
Secure • Fast • Smart Complaint Tracking
</div>

</div>

<script>

async function login(){

const res = await fetch(
"http://localhost:5000/login",
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

email:
document.getElementById("email").value,

password:
document.getElementById("password").value

})

}
);

const data = await res.json();

if(data.token){

localStorage.setItem(
"token",
data.token
);

alert("Login Successful 🚀");

window.location.href =
"complaints.html";

}

else{

alert("Invalid Credentials ❌");

}

}

</script>

</body>
</html>
